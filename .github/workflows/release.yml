name: Build and release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: 1.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build compact release APK
        run: gradle --no-daemon assembleRelease

      - name: Name artifact
        run: cp app/build/outputs/apk/release/app-release.apk "GLoader-${VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: GLoader-${{ env.VERSION }}
          path: GLoader-${{ env.VERSION }}.apk

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${VERSION}" "GLoader-${VERSION}.apk" --title "GLoader ${VERSION}" --generate-notes
