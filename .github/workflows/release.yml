name: Build and release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: 1.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build compact release APK
        run: gradle --no-daemon assembleRelease buildInstallHelper

      - name: Name artifact
        run: |
          cp app/build/outputs/apk/release/app-release.apk "GLoader-${VERSION}.apk"
          cp build/installer-helper/gloader-install-helper.jar "gloader-install-helper-${VERSION}.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: GLoader-${{ env.VERSION }}
          path: |
            GLoader-${{ env.VERSION }}.apk
            gloader-install-helper-${{ env.VERSION }}.jar

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${VERSION}" "GLoader-${VERSION}.apk" "gloader-install-helper-${VERSION}.jar" --title "GLoader ${VERSION}" --generate-notes
